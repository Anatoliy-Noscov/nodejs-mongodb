tags:
  - Contacts
summary: Update contact
operationId: updateContact
description: 'Update contact by id'
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
      example: '65ca67e7ae7f10c88b598384'
requestBody:
  content:
    application/json:
      schema:
        $ref: '../swagger/components/schemas/contactUpdate.yaml'
responses:
  '200':
    description: 'Successfully updated contact'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully updated contact!
            data:
              type: object
              $ref: '../swagger/components/schemas/contacts.yaml'
  '401':
    $ref: '../swagger/components/responses/401.yaml'
  '404':
    $ref: '../swagger/components/responses/404.yaml'